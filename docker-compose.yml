# Volsung Microservices Architecture
# Docker Compose configuration for running all services
#
# Services:
#   - coordinator: Main API gateway (port 8000)
#   - qwen-voice: Qwen VoiceDesign service (port 8001)
#   - qwen-base: Qwen Base TTS service (port 8002)
#   - styletts: StyleTTS2 service (port 8003)
#   - sfx: AudioLDM sound effects service (port 8004)
#
# NOTE: MusicGen service removed due to Python 3.9/dependency conflicts
#
# Usage:
#   docker-compose up -d        # Start all services
#   docker-compose logs -f      # Follow logs
#   docker-compose down          # Stop all services
#
# For development with hot reload:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  # ============================================================================
  # Qwen VoiceDesign Service (Voice Cloning with Qwen3-TTS)
  # ============================================================================
  qwen-voice:
    build:
      context: .
      dockerfile: Dockerfile.qwen-voice
    container_name: volsung-qwen-voice
    environment:
      - QWEN_VOICE_SERVICE_HOST=0.0.0.0
      - QWEN_VOICE_SERVICE_PORT=8001
      - QWEN_VOICE_IDLE_TIMEOUT=300
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "8001:8001"
    volumes:
      - qwen_voice_models:/app/models
      - qwen_voice_cache:/root/.cache
      - qwen_voice_outputs:/app/outputs
    networks:
      - volsung-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ============================================================================
  # Qwen Base Service (Base TTS with Qwen3-TTS)
  # ============================================================================
  qwen-base:
    build:
      context: .
      dockerfile: Dockerfile.qwen-base
    container_name: volsung-qwen-base
    environment:
      - QWEN_BASE_SERVICE_HOST=0.0.0.0
      - QWEN_BASE_SERVICE_PORT=8002
      - QWEN_BASE_IDLE_TIMEOUT=300
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "8002:8002"
    volumes:
      - qwen_base_models:/app/models
      - qwen_base_cache:/root/.cache
      - qwen_base_outputs:/app/outputs
    networks:
      - volsung-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ============================================================================
  # StyleTTS2 Service (Text-to-Speech using StyleTTS2)
  # ============================================================================
  styletts:
    build:
      context: .
      dockerfile: Dockerfile.styletts
    container_name: volsung-styletts
    environment:
      - STYLETTS_SERVICE_HOST=0.0.0.0
      - STYLETTS_SERVICE_PORT=8003
      - STYLETTS_IDLE_TIMEOUT=300
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "8003:8003"
    volumes:
      - styletts_models:/app/models
      - styletts_cache:/root/.cache
      - styletts_outputs:/app/outputs
    networks:
      - volsung-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ============================================================================
  # SFX Service (Sound Effects Generation using AudioLDM)
  # NOTE: Music service removed due to Python 3.9/dependency conflicts
  # ============================================================================
  # ============================================================================
  sfx:
    build:
      context: .
      dockerfile: Dockerfile.sfx
    container_name: volsung-sfx
    environment:
      - SFX_SERVICE_HOST=0.0.0.0
      - SFX_SERVICE_PORT=8004
      - SFX_IDLE_TIMEOUT=300
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "8004:8004"
    volumes:
      - sfx_models:/app/models
      - sfx_cache:/root/.cache
      - sfx_outputs:/app/outputs
    networks:
      - volsung-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ============================================================================
  # Coordinator (API Gateway)
  # ============================================================================
  coordinator:
    build:
      context: .
      dockerfile: Dockerfile.coordinator
    container_name: volsung-coordinator
    environment:
      - COORDINATOR_HOST=0.0.0.0
      - COORDINATOR_PORT=8000
      - QWEN_VOICE_SERVICE_URL=http://qwen-voice:8001
      - QWEN_BASE_SERVICE_URL=http://qwen-base:8002
      - STYLETTS_SERVICE_URL=http://styletts:8003
      - SFX_SERVICE_URL=http://sfx:8004
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "8000:8000"
    volumes:
      - coordinator_outputs:/app/outputs
    depends_on:
      qwen-voice:
        condition: service_healthy
      qwen-base:
        condition: service_healthy
      styletts:
        condition: service_healthy
      sfx:
        condition: service_healthy
    networks:
      - volsung-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

# ==============================================================================
# Volumes for persistent data
# ==============================================================================
volumes:
  # Qwen Voice service
  qwen_voice_models:
    driver: local
  qwen_voice_cache:
    driver: local
  qwen_voice_outputs:
    driver: local
  
  # Qwen Base service
  qwen_base_models:
    driver: local
  qwen_base_cache:
    driver: local
  qwen_base_outputs:
    driver: local
  
  # StyleTTS2 service
  styletts_models:
    driver: local
  styletts_cache:
    driver: local
  styletts_outputs:
    driver: local
  
  # Music service
  music_models:
    driver: local
  music_cache:
    driver: local
  music_outputs:
    driver: local
  
  # SFX service
  sfx_models:
    driver: local
  sfx_cache:
    driver: local
  sfx_outputs:
    driver: local
  
  # Coordinator
  coordinator_outputs:
    driver: local

# ==============================================================================
# Network for inter-service communication
# ==============================================================================
networks:
  volsung-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
